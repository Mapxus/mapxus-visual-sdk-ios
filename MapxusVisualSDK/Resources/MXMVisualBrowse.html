<!-- embed starts here-->
<style>
    .visualView-wrapper {
        position: absolute;
        background-color: grey;
        width: 100%;
        height: 100%;
        padding-top: 0px;
        margin: 0px;
    }

    #visualView {
        position: absolute;
        padding: 0px;
        margin: 0px;

        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
    }

    .mapillary-js {
        width: 100%;
        height: 100%;
    }

    .SequenceContainer {
        margin-top: 5%;
    }

</style>

<div class="visualView-wrapper">
    <div id="visualView"></div>
</div>
<script>

        var componentOptions = null;

        if (Beeview.isSupported()) {
            // Enable or disable any components, e.g. tag and popup which requires WebGL support
            // or use the default components by not supplying any component options.
            componentOptions = { /* Default options */ };
        } else if (Beeview.isFallbackSupported()) {
            // On top of the disabled components below, also the popup, marker and tag
            // components require WebGL support and should not be enabled (they are
            // disabled by default so does not need to be specified below).
            componentOptions = {
                cover: false,
                image: false,
                stats: false,
                tag: true,
                marker: true,
                direction: false,
                bearing: false,
            }
        }

        if (componentOptions === null) {
            // Handle the fact that Beeview is not supported in a way that is
            // appropriate for your application.
            var messageDiv = document.createElement('div');
            messageDiv.innerHTML = "Beeview is not supported by your browser.";
            messageDiv.style.marginTop = "100px";

            var visualViewDiv = document.getElementById('visualView');
            visualViewDiv.style.textAlign = "center";
            visualViewDiv.appendChild(messageDiv);
        } else {
            // Deactivate cover without interaction needed.
            componentOptions.cover = false;

            var visualView = new Beeview.Viewer(
                'visualView',
                null,
                null,
                { component: componentOptions });
        }

</script>
